name: translate-python-to-ts
description: Convert all Python code fences in an MDX page into CodeGroups with TypeScript translations
run: |
  target="$1"
  if [ -z "$target" ]; then
    echo "Usage: cursor translate-python-to-ts <path-to-mdx>" >&2
    exit 1
  fi
  node ./scripts/translate-python-to-ts.mjs "$target"

